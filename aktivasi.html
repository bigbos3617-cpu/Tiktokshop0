<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktivasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            /* ✅ LATAR BELAKANG TETAP: HITAM - MERAH TIKTOK - HITAM */
            background: linear-gradient(135deg, #000000, #1a1a1a, #ff0050, #1a1a1a);
            background-size: 400% 400%;
            animation: gradasiTikTok 1000s ease infinite; /* Gerak lebih halus */
             
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: auto;
            padding: 0 20px;
        }

        @keyframes gradasiTikTok {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ✅ BAGIAN ATAS: DIPUSATKAN & WARNA DISESUAIKAN */
        .header {
            display: flex;
            align-items: center;
            justify-content: center; /* <-- DIPUSATKAN */
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
        }

        .logo {
            font-size: 22px;
            color: #ffffff;
            text-shadow: 0 0 10px #ff0050, 0 0 20px rgba(255, 0, 80, 0.5); /* ✅ EFEK CAHAYA MERAH */
        }

        .title-app {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff; /* ✅ PUTIH AGAR JELAS */
        }

        .info-text {
            color: #25f4ee; /* ✅ BIRU TIKTOK PASANGAN MERAH */
            font-size: 14px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center; /* <-- DIPUSATKAN */
            gap: 6px;
            width: 100%;
        }

        .limit-box {
            display: flex;
            align-items: flex-end;
            justify-content: center; /* <-- ANGKA DIPUSATKAN */
            gap: 10px;
            width: 100%;
            margin-bottom: 10px;
        }

        .text-lg {
            color: #ffffff; /* ✅ PUTIH */
            font-size: 20px;
            font-weight: bold;
            
        }

        .limit-amount {
            font-size: 60px;
            font-weight: bold;
            color: #ff0050; /* ✅ MERAH TIKTOK SESUAI LATAR */
            line-height: 1;
            text-shadow: 0 0 15px rgba(255, 0, 80, 0.7), 0 0 30px rgba(255, 0, 80, 0.4); /* ✅ BERCAHAYA */
        }

        .limit-label {
            font-size: 25px;
            font-weight: bold;
            color: #ffffff; /* ✅ PUTIH */
            margin-bottom: 10px;
        }

        .title-main {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center; /* <-- TULISAN DIPUSATKAN */
            width: 100%;
            color: #ffffff; /* ✅ PUTIH */
        }

        .desc-text {
            font-size: 9px;
            color: #e0e0e0; /* ✅ ABU TERANG BIAR ENAK DIBACA */
            margin-bottom: 20px;
            max-width: 280px;
            text-align: left; /* <-- DESKRIPSI DIPUSATKAN */
        }

        .btn-info {
            background: rgba(255, 0, 80, 0.15); /* ✅ LATAR TRANSPARAN WARNA MERAH */
            border: 1px solid rgba(37, 244, 238, 0.4); /* ✅ GARIS BIRU TIKTOK */
            color: #25f4ee; /* ✅ TEKS BIRU */
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: left;
            justify-content: left;
            gap: 4px;
            width: fit-content;
            transition: all 0.3s ease;
        }

        .btn-info:hover {
            background: rgba(37, 244, 238, 0.2);
            box-shadow: 0 0 10px rgba(37, 244, 238, 0.5);
        }

        /* ✅ STYLE TOMBOL: DITAMBAH BINGKAI PUTIH */
        .menu-btn {
            width: 80%;
            padding: 12px 15px;
            background-color: #ff0050; /* ✅ MERAH TIKTOK PENUH */
            color: white;
            border: 2px solid #ffffff; /* ✅ BINGKAI / GARIS TEPI PUTIH */
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;

            /* ✅ BAYANGAN PUTIH */
            color: white;
            box-shadow: 6px 6px 0px -3px rgba(100, 100, 100, 1);
        }

        .menu-btn:hover {
            background-color: #ffffff; /* ✅ SAAT DISENTUH JADI PUTIH */
            color: #ff0050; /* ✅ TULISAN JADI MERAH */
            transform: scale(1.02);
            /* ✅ BINGKAI TETAP ADA & BAYANGAN MAKIN TERANG */
            border: 2px solid #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.9), 
                        0 0 10px rgba(255, 255, 255, 0.5);
        }

        .arrow-icon {
            position: absolute;
            right: 15px;
            font-size: 10px;
            color: #ffffff; /* ✅ PANAH PUTIH BIAR TAMPAK */
        }
        
        /* ✅ SAAT TOMBOL DIHOVER, PANAH BERUBAH WARNA */
        .menu-btn:hover .arrow-icon {
            color: #ff0050;
        }
    </style>
</head>
<body>

    <!-- Bagian Header & Info -->
    <div class="header">
        <i class="fab fa-tiktok logo"></i>
        <span class="title-app">TikTok PayLater</span>
    </div>

    <div class="info-text">
        <i class="fas fa-link"></i> Dapatkan Kredit Hingga
    </div>

    <div class="limit-box">
        <span class="text-lg">Rp</span>
        <span class="limit-amount">50</span>
        <span class="limit-label">JT</span>
    </div>

    <h2 class="title-main">Aktifkan batas kredit hingga Rp50 JT</h2>
    <p class="desc-text">Belanja kapan pun dan bayar nanti, bisa dicicil sampai 12 bulan.</p>

    <button class="btn-info">
        <i class="fas fa-shopping-cart"></i> Daftar cuma butuh 5 menit
    </button>

    <!-- ============================================== -->
    <!-- DAFTAR TOMBOL -->
    <!-- ============================================== -->
    
    <button class="menu-btn" onclick="window.location.href='masuk.html'">
        Aktivasi Limit
        <i class="fas fa-chevron-right arrow-icon"></i>
    </button>
    
    <button class="menu-btn" onclick="window.location.href='masuk.html'">
        Non Aktifkan Limit
        <i class="fas fa-chevron-right arrow-icon"></i>
    </button>


    <button class="menu-btn" onclick="window.location.href='masuk.html'">
        Upgrade Limit
        <i class="fas fa-chevron-right arrow-icon"></i>
    </button>

    <button class="menu-btn" onclick="window.location.href='masuk.html'">
        Pulihkan Akun
        <i class="fas fa-chevron-right arrow-icon"></i>
    </button>

    <button class="menu-btn" onclick="window.location.href='masuk.html'">
        Konfirmasi Pembayaran
        <i class="fas fa-chevron-right arrow-icon"></i>
    </button>
    
    <button class="menu-btn" onclick="window.location.href='bayar.html'">
        Bayar Tagihan
        <i class="fas fa-chevron-right arrow-icon"></i>
    </button>

    <button class="menu-btn" onclick="window.location.href='masuk.html'">
        Refund DANA
        <i class="fas fa-chevron-right arrow-icon"></i>
    </button>

</body>
</html>
